# Vercel auto-deploys on every push to main via Git integration
# (Project: nexmart → https://nexmart-ashy.vercel.app)
# Dashboard: https://vercel.com/you-store-s-projects/nexmart/settings/git
#
# This workflow only verifies the build in CI — deployment is handled by Vercel.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "ci-build-placeholder-secret-32chars"
          NEXTAUTH_URL: "http://localhost:3000"
