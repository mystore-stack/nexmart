# ═══════════════════════════════════════════════════════════
# 🚀 NexMart Maroc — Production Deploy Workflow
# Trigger: push sur main → deploy automatique sur Vercel
# ═══════════════════════════════════════════════════════════

name: 🚀 Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # لاش تقدر تشغله يدوياً من GitHub

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────
  # JOB 1: Quality Check (TypeScript + Lint)
  # ─────────────────────────────────────
  quality:
    name: ✅ Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔷 Generate Prisma Client
        run: npx prisma generate

      - name: 🔍 TypeScript check
        run: npx tsc --noEmit

      - name: 🧹 Lint check
        run: npm run lint --if-present

  # ─────────────────────────────────────
  # JOB 2: Build Test
  # ─────────────────────────────────────
  build:
    name: 🏗️ Build Test
    runs-on: ubuntu-latest
    needs: quality
    env:
      # Variables minimales pour que le build passe
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXTAUTH_URL }}
      DEFAULT_ORGANIZATION_SLUG: nexmart
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      NEXT_PUBLIC_ENABLE_AI_CHAT: 'true'
      NEXT_PUBLIC_ENABLE_AI_SEARCH: 'true'
      NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN: 'false'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔷 Generate Prisma Client
        run: npx prisma generate

      - name: 🏗️ Build Next.js
        run: npm run build

      - name: 📊 Build size report
        run: |
          echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────
  # JOB 3: Deploy to Vercel Production
  # ─────────────────────────────────────
  deploy:
    name: 🌍 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: 📢 Deploy Summary
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 URL | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Commit | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
