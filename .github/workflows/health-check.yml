# ═══════════════════════════════════════════════════════════
# 💓 NexMart — Health Check Workflow
# Trigger: كل ساعة — يتحقق أن الموقع شغال
# ═══════════════════════════════════════════════════════════

name: 💓 Health Check

on:
  schedule:
    - cron: '0 * * * *'  # كل ساعة
  workflow_dispatch:

jobs:
  health:
    name: 💓 Check Site Health
    runs-on: ubuntu-latest

    steps:
      - name: 🌍 Check Homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXTAUTH_URL }})
          echo "Homepage status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage DOWN! Status: $STATUS"
            exit 1
          fi
          echo "✅ Homepage OK"

      - name: 🔌 Check API Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXTAUTH_URL }}/api/health)
          echo "API status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "404" ]; then
            echo "⚠️ API issue: $STATUS"
          fi

      - name: 🛒 Check Products API
        run: |
          RESPONSE=$(curl -s "${{ secrets.NEXTAUTH_URL }}/api/products?limit=1")
          echo "Products API response: $RESPONSE" | head -c 200
          echo ""

      - name: ✅ Health Summary
        run: |
          echo "## 💓 Health Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Site | ${{ secrets.NEXTAUTH_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Checked at | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Status | All systems operational |" >> $GITHUB_STEP_SUMMARY
