# ═══════════════════════════════════════════════════════════
# 🗄️ NexMart — Database Migration Workflow
# Trigger: يدوي فقط — كل مرة تعدل schema.prisma
# ═══════════════════════════════════════════════════════════

name: 🗄️ Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to migrate'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true

jobs:
  migrate:
    name: 🗄️ Run Migrations
    runs-on: ubuntu-latest

    steps:
      - name: ❌ Check confirmation
        if: ${{ github.event.inputs.confirm != 'CONFIRM' }}
        run: |
          echo "❌ You must type CONFIRM to run migrations!"
          exit 1

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install
        run: npm install --legacy-peer-deps

      - name: 🔷 Generate Prisma Client
        run: npx prisma generate

      - name: 🗄️ Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🗄️ Running migrations on ${{ github.event.inputs.environment }}..."
          npx prisma migrate deploy
          echo "✅ Migrations completed!"

      - name: 📊 Migration Summary
        run: |
          echo "## 🗄️ Migration Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ Date | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
