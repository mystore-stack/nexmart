# ═══════════════════════════════════════════════════════════
# 👁️ NexMart — Preview Deploy Workflow
# Trigger: Pull Request → Preview URL أوتوماتيكي
# ═══════════════════════════════════════════════════════════

name: 👁️ Preview Deploy

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────
  # JOB 1: Quick Quality Check
  # ─────────────────────────────────────
  lint:
    name: 🔍 Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm install --legacy-peer-deps
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint --if-present

  # ─────────────────────────────────────
  # JOB 2: Preview Deploy
  # ─────────────────────────────────────
  preview:
    name: 🔮 Deploy Preview
    runs-on: ubuntu-latest
    needs: lint
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: 💬 Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔮 Preview Deploy Ready!
              
| | |
|---|---|
| 🌍 **Preview URL** | ${url} |
| 📝 **Commit** | \`${sha}\` |
| 👤 **By** | @${{ github.actor }} |
| ⏰ **Date** | ${new Date().toLocaleString('fr-MA')} |

> ✅ TypeScript OK · Lint OK · Build OK`
            });
